<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📐</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scholar AI | 学术研究智能体</title>
    <!-- Theme FOUC guard: apply persisted theme before React mounts. -->
    <script>
      (function () {
        try {
          var k = 'scholar-ai.theme';
          var saved = localStorage.getItem(k);
          var mode = (saved === 'light' || saved === 'dark' || saved === 'system') ? saved : 'system';
          var dark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var root = document.documentElement;
          if (dark) root.classList.add('dark'); else root.classList.remove('dark');
          root.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) { /* localStorage unavailable */ }
      })();
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="antialiased selection:bg-primary/20 selection:text-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
