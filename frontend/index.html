<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/app-icon-180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#F7F9FB" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />
    <title>Scholar AI | 学术研究智能体</title>
    <!-- Theme FOUC guard: apply persisted theme before React mounts. -->
    <script>
      (function () {
        try {
          var k = 'scholar-ai.theme';
          var saved = localStorage.getItem(k);
          var mode = (saved === 'light' || saved === 'dark' || saved === 'system') ? saved : 'system';
          var dark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var root = document.documentElement;
          if (dark) root.classList.add('dark'); else root.classList.remove('dark');
          root.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) { /* localStorage unavailable */ }
      })();
    </script>
  </head>
  <body class="antialiased selection:bg-primary/20 selection:text-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
