[pytest]
asyncio_mode = auto
norecursedirs =
    *.egg
    .*
    _darcs
    build
    CVS
    dist
    node_modules
    venv
    github
    legacy_archive
    local_first_agent_backups
    .rollback_snapshots
addopts = -p no:warnings --ignore=test_recovery_api_routes_real.py::TestRecoveryAPIRoutes::test_recovery_recommendations_with_memory_evidence
markers =
    asyncio: run coroutine tests in an asyncio event loop via pytest-asyncio
    persistence_smoke: fast persistence contract checks used before broad reruns
    persistence_full: complete persistence regression gate for sign-off
