[pytest]
asyncio_mode = auto
norecursedirs =
    *.egg
    .*
    _darcs
    build
    CVS
    dist
    node_modules
    venv
    github
    legacy_archive
    local_first_agent_backups
    .rollback_snapshots
    workspace_artifacts
    workspace_references
    tools
addopts = -p no:warnings
markers =
    asyncio: run coroutine tests in an asyncio event loop via pytest-asyncio
    persistence_smoke: fast persistence contract checks used before broad reruns
    persistence_full: complete persistence regression gate for sign-off
    wiki_wave14: focused LLM-Wiki Wave 14 evaluation and quality-gate tests
    unit: unit-scope tests
    integration: integration-scope tests that exercise multiple modules
    performance: performance and benchmarking tests
    smoke: smoke/e2e tests intended for ad-hoc verification
