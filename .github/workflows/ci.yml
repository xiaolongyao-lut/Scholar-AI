name: CI

"on":
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements-ci.txt"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Compile Critical Modules
        run: |
          python -X utf8 -m py_compile \
            material_bundler.py \
            word_generator.py \
            rag_integration_entry.py \
            main_rag_workflow.py \
            layers/e_ragflow_retrieval_adapter.py \
            layers/g_synthesis_graphrag_bridge.py \
            layers/p_layer_presentation_word.py \
            layers/v_eval_autorag_runner.py \
            test_word_docx_smoke.py \
            tests_semantic_themes.py

      - name: Run Integration And Adapter Tests
        run: |
          python -X utf8 -m unittest \
            test_ragflow_integration.py \
            test_adapter_improvements.py -v

      - name: Run Semantic Themes Regression Tests
        run: |
          python -X utf8 -m unittest tests_semantic_themes.py -v

      - name: Run Word Docx Smoke Test
        run: |
          python -X utf8 -m unittest test_word_docx_smoke.py -v

      - name: Run Focus Registry Regression Tests
        run: |
          python -X utf8 quick_focus_registry_test.py
          python -X utf8 focus_registry_smoke_test.py

      - name: Run GraphRAG Acceptance
        run: |
          python -X utf8 -m layers.g_synthesis_graphrag_bridge

      - name: Run AutoRAG Acceptance
        run: |
          python -X utf8 -m layers.v_eval_autorag_runner

      - name: CLI Help Smoke Test
        run: |
          python -X utf8 rag_integration_entry.py --help
