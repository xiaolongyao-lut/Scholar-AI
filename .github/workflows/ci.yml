name: CI

"on":
  push:
    branches:
      - main
      - "integration/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: literature_assistant/core

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "requirements-ci.txt"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Path Diagnostic
        run: |
          python -X utf8 run_literature_assistant.py paths

      - name: Compile Workspace
        run: |
          python -X utf8 -m compileall -q literature_assistant run_literature_assistant.py sitecustomize.py tests/conftest.py workspace_tests/evaluation_scripts

      - name: Collect Backend Tests
        run: |
          python -X utf8 -m pytest tests --collect-only -q
