name: Windows Build

"on":
  workflow_dispatch:
    inputs:
      version:
        description: "Version string for the build"
        required: false
        default: "1.0.0"
        type: string
      skip-inno:
        description: "Skip Inno Setup installer creation"
        required: false
        default: false
        type: boolean
      skip-frozen-smoke:
        description: "Skip frozen first-launch smoke test"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "requirements-ci.txt"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
          python -m pip install pyinstaller
          
          # Create virtual environment for build script
          python -m venv .venv-1
          .venv-1\Scripts\pip install --upgrade pip
          .venv-1\Scripts\pip install -r requirements-ci.txt
          .venv-1\Scripts\pip install pyinstaller

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Validate Frontend Build
        run: |
          if (-not (Test-Path "frontend/dist/index.html")) {
            Write-Error "Frontend build failed - index.html not found"
            exit 1
          }

      - name: Determine Version
        id: version
        run: |
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}" -match "refs/tags/v(.+)") {
            $version = $Matches[1]
          } else {
            $version = "${{ inputs.version }}"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $version"

      - name: Run Build Script
        run: |
          $skipInno = "${{ inputs.skip-inno }}" -eq "true"
          $skipFrozenSmoke = "${{ inputs.skip-frozen-smoke }}" -eq "true"
          
          $args = @("-Version", "${{ steps.version.outputs.version }}")
          if ($skipInno) { $args += "-SkipInno" }
          if ($skipFrozenSmoke) { $args += "-SkipFrozenSmoke" }
          
          .\scripts\build_windows_exe.ps1 @args

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ steps.version.outputs.version }}
          path: |
            workspace_artifacts/releases/${{ steps.version.outputs.version }}/onedir/
            workspace_artifacts/releases/${{ steps.version.outputs.version }}/SHA256SUMS.txt
          retention-days: 30

      - name: Upload Installer
        if: ${{ inputs.skip-inno != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ steps.version.outputs.version }}
          path: workspace_artifacts/releases/${{ steps.version.outputs.version }}/Scholar-AI-Setup-${{ steps.version.outputs.version }}-windows-x64.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            workspace_artifacts/releases/${{ steps.version.outputs.version }}/Scholar-AI-Setup-${{ steps.version.outputs.version }}-windows-x64.exe
            workspace_artifacts/releases/${{ steps.version.outputs.version }}/SHA256SUMS.txt
          draft: true
          generate_release_notes: true
