[mcp_servers.literature_assistant]
command = "powershell"
args = [
  "-NoProfile",
  "-ExecutionPolicy",
  "Bypass",
  "-File",
  "C:\\path\\to\\Scholar-AI\\agent_mcp_server\\bin\\lit-assistant-mcp.ps1"
]
cwd = "C:\\path\\to\\Scholar-AI"
startup_timeout_sec = 20
tool_timeout_sec = 90
default_tools_approval_mode = "prompt"
enabled = true

[mcp_servers.literature_assistant.env]
LITERATURE_ASSISTANT_REPO_ROOT = "C:\\path\\to\\Scholar-AI"
LITASSIST_MCP_ENABLE_EXPERIMENTAL_TOOLS = "1"
